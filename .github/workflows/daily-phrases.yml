name: Daily English Phrases

on:
  schedule:
    - cron: '0 16 * * *'   # 16:00 UTC = 00:00 Beijing time (UTC+8)
  workflow_dispatch:         # allows manual trigger from GitHub Actions UI

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Generate today's phrases
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: python generate.py

      - name: Commit and push
        run: |
          git config user.name "Daily English Bot"
          git config user.email "bot@noreply.github.com"
          git add index.html archive/
          git diff --staged --quiet || git commit -m "Daily phrases: $(TZ='Asia/Shanghai' date +'%Y-%m-%d')"
          git push
