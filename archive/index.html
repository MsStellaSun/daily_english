    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {

      --card: #ffffff;

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }
    nav { background: #fff; border-bottom: 1px solid var(--subtle); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }

    .nav-brand span { color: var(--gold); }
    .nav-date { font-size: 12px; color: var(--muted); }
    .hero { background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); color: #fff; padding: 28px 20px; text-align: center; }
    .hero-label { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .hero h1 { font-size: 22px; font-weight: 800; }
    .content { padding: 20px 16px; max-width: 600px; margin: 0 auto; }
    .archive-item { display: flex; align-items: center; background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); text-decoration: none; color: var(--text); }
    .archive-date { font-size: 15px; font-weight: 600; }
    .today-badge { font-size: 10px; background: var(--gold-light); color: var(--gold); border-radius: 6px; padding: 2px 8px; font-weight: 700; margin-left: 8px; letter-spacing: 0.04em; }
    .archive-arrow { font-size: 20px; color: #ccc; margin-left: auto; }
    .archive-item:hover .archive-arrow { color: var(--gold); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--subtle); display: flex; padding: 10px 0 14px; z-index: 10; }
    .bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; color: var(--muted); cursor: pointer; background: none; border: none; padding: 0; transition: color 0.15s; text-decoration: none; }
    .bottom-nav-item.active { color: var(--gold); }
    .bottom-nav-icon { font-size: 20px; line-height: 1; }
